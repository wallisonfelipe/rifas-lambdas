name: 🚀 Deploy Lambdas via Serverless Framework

on:
    workflow_dispatch:
    push:
        branches:
            - main
            - develop

env:
    AWS_REGION: sa-east-1
    NODE_VERSION: "20"

jobs:
    deploy:
        runs-on: ubuntu-latest
        environment: ${{ github.ref_name == 'main' && 'main' || 'develop' }}

        env:
            SLS_STAGE: ${{ github.ref_name == 'main' && 'production' || 'dev' }}
            ENV_LABEL: ${{ github.ref_name == 'main' && 'PRODUCTION' || 'DEVELOP' }}

        steps:
            - name: 📥 Checkout do repositório
              uses: actions/checkout@v4

            - name: 🟢 Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: yarn

            - name: 📝 Notificação Discord - Início do Deploy
              run: |
                  curl -H "Content-Type: application/json" \
                    -X POST \
                    -d "{\"content\":\"🔨 Iniciando deploy rifas-payments ${ENV_LABEL}! (\`${GITHUB_SHA::7}\`)\"}" \
                    ${{ secrets.DISCORD_WEBHOOK_URL }}

            - name: 📦 Instalar dependências
              run: yarn install --frozen-lockfile

            - name: 🔐 Configurar credenciais AWS
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: 🚀 Serverless deploy
              env:
                  SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
                  DB_HOST: ${{ secrets.DB_HOST }}
                  DB_PORT: ${{ secrets.DB_PORT }}
                  DB_SECRET_ARN: ${{ secrets.DB_SECRET_ARN }}
                  LAMBDA_SECURITY_GROUP_ID: ${{ secrets.LAMBDA_SECURITY_GROUP_ID }}
                  LAMBDA_SUBNET_ID_1: ${{ secrets.LAMBDA_SUBNET_ID_1 }}
                  LAMBDA_SUBNET_ID_2: ${{ secrets.LAMBDA_SUBNET_ID_2 }}
                  LAMBDA_SUBNET_ID_3: ${{ secrets.LAMBDA_SUBNET_ID_3 }}
                  RELAY_LAMBDA_SECURITY_GROUP_ID: ${{ secrets.RELAY_LAMBDA_SECURITY_GROUP_ID }}
                  RELAY_LAMBDA_SUBNET_ID_1: ${{ secrets.RELAY_LAMBDA_SUBNET_ID_1 }}
                  RELAY_LAMBDA_SUBNET_ID_2: ${{ secrets.RELAY_LAMBDA_SUBNET_ID_2 }}
                  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
                  MYIP_PASSWORD: ${{ secrets.MYIP_PASSWORD }}
              run: npx serverless deploy --stage ${{ env.SLS_STAGE }} --region ${{ env.AWS_REGION }}

            - name: 📝 Notificação Discord - Deploy Finalizado
              if: success()
              run: |
                  curl -H "Content-Type: application/json" \
                    -X POST \
                    -d "{\"content\":\"✅ Deploy rifas-payments ${ENV_LABEL} concluído! (\`${GITHUB_SHA::7}\`)\"}" \
                    ${{ secrets.DISCORD_WEBHOOK_URL }}

            - name: 📝 Notificação Discord - Deploy Falhou
              if: failure()
              run: |
                  curl -H "Content-Type: application/json" \
                    -X POST \
                    -d "{\"content\":\"❌ Deploy rifas-payments ${ENV_LABEL} falhou! (\`${GITHUB_SHA::7}\`)\"}" \
                    ${{ secrets.DISCORD_WEBHOOK_URL }}
